version: '3.8'

services:
  partner-registration:
    build: .
    container_name: pci_partner_registration_v2
    environment:
      - PORT=8080
      - NODE_ENV=production
      - INSFORGE_API_BASE_URL=${INSFORGE_API_BASE_URL}
      - INSFORGE_API_KEY=${INSFORGE_API_KEY}
      - INSFORGE_TABLE=${INSFORGE_TABLE:-sales_partners}
      - INSFORGE_BUCKET=${INSFORGE_BUCKET:-sales-partner-documents}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-5}
      - REFERRAL_BASE_URL=${REFERRAL_BASE_URL}
      - TOS_VERSION=${TOS_VERSION}
      - INTERNAL_BASIC_AUTH_USER=${INTERNAL_BASIC_AUTH_USER}
      - INTERNAL_BASIC_AUTH_PASS=${INTERNAL_BASIC_AUTH_PASS}
    volumes:
      - partner-data-v2:/app/data
    restart: always
    networks:
      - default
      - dokploy-network

volumes:
  partner-data-v2:

networks:
  dokploy-network:
    external: true
