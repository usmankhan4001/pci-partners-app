<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rep Referral Links — PCI Internal</title>
<link rel="icon" href="/assets/logo.png" type="image/png" />
<link rel="stylesheet" href="/styles.css" />
<style>
  .builder { max-width: 480px; margin: 3rem auto; padding: 0 1rem; }
  .builder input { width: 100%; padding: 0.7rem 0.8rem; border: 1.5px solid var(--border); border-radius: 0.5rem; font-size: 1rem; margin-bottom: 0.75rem; }
  .builder button { padding: 0.7rem 1.2rem; border: none; border-radius: 0.5rem; background: var(--pci-navy); color: #fff; font-weight: 600; cursor: pointer; }
  .result { margin-top: 1.25rem; padding: 0.8rem; background: var(--card); border-radius: 0.5rem; word-break: break-all; font-size: 0.9rem; display: none; }
</style>
</head>
<body>
<header class="pci-header">
  <div class="pci-wordmark">
    <span class="pci-wordmark-main">Premier Choice</span>
    <span class="pci-wordmark-sub">Internal — Rep Referral Link Builder</span>
  </div>
</header>
<div class="builder">
  <p>Type a rep's name to get their shareable registration link. The name pre-fills and locks on the form — no directory lookup needed.</p>
  <input type="text" id="repName" placeholder="Representative name" />
  <button type="button" id="build">Build link</button>
  <div class="result" id="result"></div>
</div>
<script>
  document.getElementById("build").addEventListener("click", () => {
    const name = document.getElementById("repName").value.trim();
    if (!name) return;
    const url = `${location.origin}/register?rep=${encodeURIComponent(name)}`;
    const box = document.getElementById("result");
    box.style.display = "block";
    box.innerHTML = `<code>${url}</code> <button type="button" id="copy">Copy</button>`;
    document.getElementById("copy").addEventListener("click", (e) => {
      navigator.clipboard.writeText(url);
      e.target.textContent = "Copied!";
      setTimeout(() => (e.target.textContent = "Copy"), 1500);
    });
  });
</script>
</body>
</html>
